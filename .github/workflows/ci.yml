name: TheNumber CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly digest ogni lunedì alle 09:00 CET
    - cron: '0 8 * * 1'

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Critical tests (ogni push + PR)
  # ──────────────────────────────────────────
  test:
    name: Critical Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install -D @playwright/test
          npx playwright install chromium --with-deps

      - name: Run critical tests
        run: npx playwright test tests/critical.spec.js --reporter=list
        env:
          SITE_URL: https://simoleon93.github.io/TheNumber
          STRIPE_TIER1: ${{ secrets.STRIPE_TIER1_URL }}
          STRIPE_TIER2: ${{ secrets.STRIPE_TIER2_URL }}
          STRIPE_TIER3: ${{ secrets.STRIPE_TIER3_URL }}

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>TheNumber — Test FALLITI</b>%0A%0APush: <code>${{ github.sha }}</code>%0ABranch: <code>${{ github.ref_name }}</code>%0A%0A🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Vedi i dettagli</a>"

  # ──────────────────────────────────────────
  # JOB 2: Deploy notify (solo su push in main)
  # ──────────────────────────────────────────
  notify-deploy:
    name: Notify Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Notify Telegram — deploy riuscito
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>TheNumber — Deploy completato</b>%0A%0ACommit: <code>${{ github.event.head_commit.message }}</code>%0A%0A🌐 <a href='https://simoleon93.github.io/TheNumber'>Apri il sito</a>"

  # ──────────────────────────────────────────
  # JOB 3: Weekly monetization digest
  # ──────────────────────────────────────────
  weekly-digest:
    name: Weekly Monetization Digest
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run digest script
        run: node scripts/weekly-digest.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}